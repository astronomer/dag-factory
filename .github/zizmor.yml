# zizmor configuration — https://docs.zizmor.sh/configuration/
#
# review-bot-prs.lock.yml is generated by `gh aw compile` (GitHub Agentic Workflows).
# zizmor's template-injection rule flags the `${{ ... }}` expansions in that generated
# file, but none of the sources are attacker-controllable:
#   - ${{ steps.parse-guard-vars.outputs.* }}  — gh-aw's own values parsed from this
#     workflow's STATIC frontmatter (the allowed-repos / min-integrity guard), not event input.
#   - ${{ vars.GH_AW_DEFAULT_*_MAX_AI_CREDITS || '...' }}  — a repo-admin-set Actions variable.
# The lock is regenerated on every compile, so it can't carry inline `# zizmor: ignore`
# comments; exempt it from this one rule here instead. Hand-written workflows (cicd.yaml,
# codeql.yml, zizmor.yml) remain fully covered, including by template-injection.
rules:
  template-injection:
    ignore:
      - review-bot-prs.lock.yml
