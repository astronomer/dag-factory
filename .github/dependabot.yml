updates:
- cooldown:
    default-days: 7
  directory: /
  ignore:
  - dependency-name: "github/gh-aw-actions" # gh-aw compiler-managed action pin; keep ignored and refresh via gh aw compile.
  labels:
  - dependencies
  package-ecosystem: github-actions
  reviewers:
  - "@astronomer/oss-integrations"
  schedule:
    interval: daily
- cooldown:
    default-days: 7
  directory: /
  labels:
  - dependencies
  package-ecosystem: pre-commit
  reviewers:
  - "@astronomer/oss-integrations"
  schedule:
    interval: daily
- cooldown:
    default-days: 7
  directory: /
  groups:
    python-minor-and-patch:
      patterns:
      - "*"
      update-types:
      - minor
      - patch
  labels:
  - dependencies
  package-ecosystem: uv
  reviewers:
  - "@astronomer/oss-integrations"
  schedule:
    interval: daily
version: 2
