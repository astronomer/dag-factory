default:
  default_args:
    start_date: 2024-11-11

timetable_dataset_schedule:
  schedule:
    datasets: "((dataset_uri_1 & dataset_uri_2) | dataset_uri_3)"
    timetable:
      __type__: airflow.timetables.trigger.CronTriggerTimetable
      __args__:
        - 0 1 * * 3
      timezone: UTC
  catchup: false
  tasks:
    - task_id: "task_1"
      operator: airflow.providers.standard.operators.bash.BashOperator
      bash_command: "echo 1"
